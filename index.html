<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpriteAnimte</title>
    <link rel="icon" href="/src-tauri/icons/32x32.png" type="image/png" />
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      (() => {
        const retryKey = "spriteanime-startup-retry";

        const hasMountedApplication = () => {
          const root = document.getElementById("app");
          return Boolean(root && root.childElementCount > 0);
        };

        const showStartupError = (detail) => {
          const root = document.getElementById("app");
          if (!root || hasMountedApplication()) {
            return;
          }
          root.innerHTML = `
            <main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#1c1c1e;color:rgba(242,240,236,.96);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">
              <section style="width:min(420px,100%);padding:20px;border:1px solid rgba(122,119,115,.34);border-radius:12px;background:#28282a;text-align:center">
                <h1 style="margin:0 0 8px;font-size:17px">界面加载失败</h1>
                <p style="margin:0 0 16px;color:rgba(206,202,195,.76);font-size:13px;line-height:1.6">开发服务未能加载前端入口，请查看运行终端中的错误。</p>
                <button id="btn-reload-app" type="button" style="min-height:36px;padding:8px 16px;border:0;border-radius:9px;background:#c28a55;color:#1c1510;font:inherit;font-weight:600;cursor:pointer">重新加载</button>
              </section>
            </main>`;
          document.getElementById("btn-reload-app")?.addEventListener("click", () => {
            sessionStorage.removeItem(retryKey);
            window.location.reload();
          });
          console.error("[startup] 前端入口加载失败", detail);
        };

        const recoverFromStartupFailure = (detail) => {
          if (hasMountedApplication()) {
            return;
          }
          const retryCount = Number(sessionStorage.getItem(retryKey) || "0");
          if (retryCount < 1) {
            sessionStorage.setItem(retryKey, String(retryCount + 1));
            window.setTimeout(() => window.location.reload(), 180);
            return;
          }
          window.setTimeout(() => showStartupError(detail), 0);
        };

        window.addEventListener("error", (event) => {
          const target = event.target;
          if (target instanceof HTMLScriptElement && target.type === "module") {
            recoverFromStartupFailure(target.src);
          }
        }, true);
        window.addEventListener("unhandledrejection", (event) => {
          recoverFromStartupFailure(event.reason);
        });
        window.addEventListener("load", () => {
          window.setTimeout(() => {
            if (hasMountedApplication()) {
              sessionStorage.removeItem(retryKey);
              return;
            }
            showStartupError("入口模块执行后未挂载应用");
          }, 1800);
        });
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
